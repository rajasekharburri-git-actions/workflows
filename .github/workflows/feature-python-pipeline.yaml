name: feature-python-pipeline

on:
  workflow_call:
    inputs:
      project:
        required: true
        type: string
      component:
        required: true
        type: string
      environment:
        required: true
        type: string

jobs:
  feature-python-pipeline:
    runs-on: [self-hosted, Linux, X64]

    env:
      ACC_ID: ${{ secrets.ACC_ID }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6                        # v6 doesn't exist; v4 is latest

      - name: List files
        run: ls -l

      - name: Get application version
        run: echo "APP_VERSION=${GITHUB_SHA::9}" >> $GITHUB_ENV

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"  #All versions from 3.6 to 3.13 are not the same.
          cache: "pip"                                 # cache pip dependencies

      - name: Verify Python
        run: |
          python --version
          pip --version

      # Removed: 'sudo yum install python39' — redundant since setup-python handles it
      - name: Install system dependencies
        run: |
          sudo yum install -y python3-devel gcc         # only build tools needed

      - name: Upgrade pip
        run: python -m pip install --upgrade pip setuptools wheel

      - name: Install dependencies
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            echo "requirements.txt not found"
          fi

      - name: Run unit tests
        id: unit_tests
        run: |
          if [ -d tests ]; then
            python -m pytest tests/ --tb=short -v
          else
            echo "No tests directory found"
          fi

      - name: Update unit tests status
        if: always()
        uses: rajasekharburri-git-actions/workflows/.github/actions/update-commit-status@main
        with:
          sha: ${{ github.sha }}
          state: ${{ steps.unit_tests.outcome }}
          context: UNIT_TESTS
          description: ${{ steps.unit_tests.outcome }}

      - name: Print inputs
        run: |
          echo "Project:     ${{ inputs.project }}"
          echo "Component:   ${{ inputs.component }}"
          echo "Environment: ${{ inputs.environment }}"
          echo "Version:     ${APP_VERSION}"

      - name: Docker build
        id: docker_build
        run: |
          docker build \
            -t ${ACC_ID}.dkr.ecr.us-east-1.amazonaws.com/${{ inputs.project }}/${{ inputs.component }}:${APP_VERSION} \
            --label "git-sha=${GITHUB_SHA}" \
            --label "build-date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            .
          docker images

      - name: Update docker build status
        if: always()
        uses: rajasekharburri-git-actions/workflows/.github/actions/update-commit-status@main
        with:
          sha: ${{ github.sha }}
          state: ${{ steps.docker_build.outcome }}
          context: DOCKER_BUILD
          description: ${{ steps.docker_build.outcome }}

      - name: Security Check (Trivy)
        id: security_check
        run: |
          echo "Running Trivy scan..."
          trivy image \
            --scanners vuln \
            --severity HIGH,CRITICAL,MEDIUM \
            --pkg-types os \
            --exit-code 1 \
            --format table \
            ${ACC_ID}.dkr.ecr.us-east-1.amazonaws.com/${{ inputs.project }}/${{ inputs.component }}:${APP_VERSION}
          echo "Trivy scan passed."

      - name: Update scan status
        if: always()
        uses: rajasekharburri-git-actions/workflows/.github/actions/update-commit-status@main
        with:
          sha: ${{ github.sha }}
          state: ${{ steps.security_check.outcome }}
          context: SECURITY_CHECK
          description: ${{ steps.security_check.outcome }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4   # v4 is current latest
        with:
          aws-region: us-east-1
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Push image to ECR
        run: |
          aws ecr get-login-password --region us-east-1 \
            | docker login --username AWS --password-stdin ${ACC_ID}.dkr.ecr.us-east-1.amazonaws.com
          docker push ${ACC_ID}.dkr.ecr.us-east-1.amazonaws.com/${{ inputs.project }}/${{ inputs.component }}:${APP_VERSION}