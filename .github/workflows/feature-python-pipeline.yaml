name: feature-python-pipeline

on:
  workflow_call:
    inputs:
      project:
        required: true
        type: string
      component:
        required: true
        type: string
      environment:
        required: true
        type: string

jobs:
  feature-python-pipeline:
    runs-on: [self-hosted, Linux, X64]

    env:
      ACC_ID: ${{ secrets.ACC_ID }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: List files
        run: ls -l

      - name: Get application version
        run: |
          echo "APP_VERSION=${GITHUB_SHA::9}" >> $GITHUB_ENV

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.9'

      - name: Verify Python
        run: |
          python --version
          pip --version

      - name: Install system dependencies
        run: |
          sudo yum install -y python39 python3-devel gcc

      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip setuptools wheel

      - name: Install dependencies
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            echo "requirements.txt not found"
          fi

      - name: Run unit tests
        id: unit_tests
        run: |
          if [ -d tests ]; then
            python -m pytest tests/
          else
            echo "No tests directory found"
          fi

      - name: Update unit tests status
        if: always()
        uses: rajasekharburri-git-actions/workflows/.github/actions/update-commit-status@main
        with:
          sha: ${{ github.sha }}
          state: ${{ steps.unit_tests.outcome }}
          context: UNIT_TESTS
          description: ${{ steps.unit_tests.outcome }}

      - name: Print inputs
        run: |
          echo "Project: ${{ inputs.project }}"
          echo "Component: ${{ inputs.component }}"
          echo "Environment: ${{ inputs.environment }}"
          echo "Version: ${APP_VERSION}"

      - name: Docker build
        id: docker_build
        run: |
          docker build -t ${ACC_ID}.dkr.ecr.us-east-1.amazonaws.com/${{ inputs.project }}/${{ inputs.component }}:${APP_VERSION} .
          docker images

      - name: Update docker build status
        if: always()
        uses: rajasekharburri-git-actions/workflows/.github/actions/update-commit-status@main
        with:
          sha: ${{ github.sha }}
          state: ${{ steps.docker_build.outcome }}
          context: DOCKER_BUILD
          description: ${{ steps.docker_build.outcome }}

      - name: Security Check (Dependabot + Trivy)
        id: security_check
        shell: bash
        run: |
          echo "Running Trivy scan..."

          trivy image \
            --scanners vuln \
            --severity HIGH,CRITICAL,MEDIUM \
            --pkg-types os \
            --exit-code 1 \
            --format table \
            ${ACC_ID}.dkr.ecr.us-east-1.amazonaws.com/${{ inputs.project }}/${{ inputs.component }}:${APP_VERSION}

          TRIVY_RESULT=$?

          if [ "$TRIVY_RESULT" -ne 0 ]; then
            echo "Trivy found vulnerabilities (HIGH/CRITICAL/MEDIUM)"
            exit 1
          fi

          echo "Trivy scan passed without blocking issues."

      - name: Update scan status
        if: always()
        uses: rajasekharburri-git-actions/workflows/.github/actions/update-commit-status@main
        with:
          sha: ${{ github.sha }}
          state: ${{ steps.security_check.outcome }}
          context: SECURITY_CHECK
          description: ${{ steps.security_check.outcome }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          aws-region: us-east-1
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Push image
        run: |
          aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin ${ACC_ID}.dkr.ecr.us-east-1.amazonaws.com

          docker push ${ACC_ID}.dkr.ecr.us-east-1.amazonaws.com/${{ inputs.project }}/${{ inputs.component }}:${APP_VERSION}