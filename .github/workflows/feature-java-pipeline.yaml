name: feature-java-pipeline

on:
  workflow_call:
    inputs:
      project:
        required: true
        type: string

      component:
        required: true
        type: string

      environment:
        required: true
        type: string

jobs:
  feature-build:
    runs-on: self-hosted

    env:
      APP_NAME: ${{ inputs.component }}
      ENVIRONMENT: ${{ inputs.environment }}

    steps:
      - name: Checkout Source
        uses: actions/checkout@v6

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Verify Files
        run: |
          pwd
          ls -la
          test -f pom.xml

      - name: Maven Build
        run: mvn clean package -DskipTests

      - name: List Target Files
        run: ls -la target/

      - name: Build Docker Image
        run: |
          docker build -t ${APP_NAME}:${GITHUB_SHA} .

      - name: Docker Images
        run: docker images

      - name: Cleanup Old Docker Images
        run: |
          docker image prune -f