name: dev-java-pipeline

on:
  workflow_call:
    inputs:
      project:
        required: true
        type: string
      component:
        required: true
        type: string
      environment:
        required: true
        type: string


jobs:
  dev-java-pipeline:
    runs-on: [self-hosted, Linux, X64]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6                          # ✅ fixed

      - name: Setup Java 17
        uses: actions/setup-java@v5                        # ✅ fixed
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: List files
        run: ls -l

      - name: Get the version
        run: echo "APP_VERSION=${GITHUB_SHA::9}" >> "$GITHUB_ENV"

      - name: Print inputs
        run: |
          echo ${{ inputs.project }}
          echo "version: ${APP_VERSION}"

      - name: Run unit tests
        id: unit_tests
        run: mvn test

      - name: Update unit tests status
        if: success() || failure()
        uses: rajasekharburri-git-actions/workflows/.github/actions/update-commit-status@main
        with:
          sha: ${{ github.sha }}
          state: ${{ steps.unit_tests.outcome }}
          context: UNIT_TESTS
          description: ${{ steps.unit_tests.outcome }}

      - name: Maven build
        run: mvn clean package -DskipTests

      - name: Docker build
        id: docker_build
        run: |
          docker build \
            -t ${{  vars.AWS_ACCOUNT_ID  }}.dkr.ecr.us-east-1.amazonaws.com/${{ inputs.project }}/${{ inputs.component }}:${APP_VERSION} .
          docker images

      - name: Update docker build status
        if: success() || failure()
        uses: rajasekharburri-git-actions/workflows/.github/actions/update-commit-status@main
        with:
          sha: ${{ github.sha }}
          state: ${{ steps.docker_build.outcome }}
          context: DOCKER_BUILD
          description: ${{ steps.docker_build.outcome }}

      - name: Security scan (Trivy)
        id: security_check
        run: |
          echo "🔍 Running Trivy scan..."
          trivy image \
            --scanners vuln \
            --severity HIGH,CRITICAL,MEDIUM \
            --pkg-types os \
            --exit-code 1 \
            --format table \
            ${{  vars.AWS_ACCOUNT_ID  }}.dkr.ecr.us-east-1.amazonaws.com/${{ inputs.project }}/${{ inputs.component }}:${APP_VERSION}
          echo "✅ Trivy scan passed."

      - name: Update scan status
        if: success() || failure()
        uses: rajasekharburri-git-actions/workflows/.github/actions/update-commit-status@main
        with:
          sha: ${{ github.sha }}
          state: ${{ steps.security_check.outcome }}
          context: SECURITY_CHECK
          description: ${{ steps.security_check.outcome }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4    # ✅ correct
        with:
          role-to-assume: arn:aws:iam::${{  vars.AWS_ACCOUNT_ID  }}:role/github-actions-role
          aws-region: us-east-1

      - name: Push image to ECR
        run: |
          aws ecr get-login-password --region us-east-1 \
            | docker login --username AWS --password-stdin ${{  vars.AWS_ACCOUNT_ID  }}.dkr.ecr.us-east-1.amazonaws.com
          docker push ${{  vars.AWS_ACCOUNT_ID  }}.dkr.ecr.us-east-1.amazonaws.com/${{ inputs.project }}/${{ inputs.component }}:${APP_VERSION}
      
      - name: authenticate to EKS
        run: |
          aws eks update-kubeconfig --region us-east-1 --name roboshop-dev
          kubectl get nodes

      - name: checkout deploy repo
        uses: actions/checkout@v6
        with:
          repository: rajasekharburri/${{ inputs.component }}-deploy

      - name: deploy to DEV cluster
        id: dev_deploy
        run:
          "helm upgrade --install ${{ inputs.component}} -f values-${{ inputs.environment }}.yaml -n ${{ inputs.project }} --set deployment.imageVersion=${APP_VERSION} --atomic --wait --timeout=5m ."

      - name: Update DEV Deploy status
        if: always()
        uses: rajasekharburri-git-actions/workflows/.github/actions/update-commit-status@main
        with:
          sha: ${{ github.sha }}
          state: ${{ steps.dev_deploy.outcome }}     # success / failure / cancelled
          context: DEV_DEPLOY
          description: ${{ steps.dev_deploy.outcome }}