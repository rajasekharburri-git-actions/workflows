name: dev-java-pipeline

on:
  workflow_call:
    inputs:
      project:
        required: true
        type: string
      component:
        required: true
        type: string
      environment:
        required: true
        type: string

jobs:
  dev-java-pipeline:
    runs-on: [self-hosted, Linux, X64]                   # ✅ explicit runner labels

    steps:
      - name: Checkout code
        uses: actions/checkout@v6                         # ✅ fixed from v6

      - name: Setup Java 17
        uses: actions/setup-java@v5                       # ✅ fixed from v5
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: List files
        run: ls -l

      - name: Get the version
        run: echo "APP_VERSION=${GITHUB_SHA::9}" >> "$GITHUB_ENV"   # ✅ short SHA, consistent with feature pipeline

      - name: Print inputs
        run: |
          echo ${{ inputs.project }}
          echo "version: ${APP_VERSION}"

